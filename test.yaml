template:
  procedure_name: "vlan_trunk_mode"
  name: "Inserimento/Aggiornamento VLAN TRUNK MODE - CISCO"
  description: "Questa procedura inserisce una nuova VLAN e/o aggiorna la description in trunk mode per apparati Cisco."

  read_only: false
  need_ise: true

  req_procedure:
    - name: intf_info_ipf

  req_inputs:
    - name: ip
      description: "IP del dispositivo Cisco ottenuto da SDB"
    - name: vlan_id
      description: "ID della VLAN da creare o aggiornare"
    - name: description
      description: "Nome della descrizione da dare alla VLAN"
    - name: interface
      description: "Interfaccia trunk, ottenuta dalla procedura intf_info_ipf"

  tasks:
    - name: pre_op_check_ssh
      type: ssh_commands
      commands:
        - show running-config vlan
        - show vlan brief

    - name: config_vlan
      type: ssh_conf_commands
      commands:
        - vlan {{ vlan_id }}
        - name {{ description }}
        - exit
        - interface {{ interface }}
        - switchport mode trunk
        - switchport trunk allowed vlan add {{ vlan_id }}
        - exit

    - name: post_op_check_ssh
      type: ssh_commands
      commands:
        - show running-config vlan
        - show vlan brief
