---
- name: "Esempio di configurazione via SSH"
  hosts: all
  gather_facts: no
  
  # TODO 4: Queste sono le variabili che il tuo parser dovrà trovare
  vars:
    app_port: 8080
    app_user: "deploy_user"
    working_dir: "/var/www/my_app"
    db_name: "production_db"
    # Esempio di input richiesto (spesso lasciato vuoto o con placeholder)
    target_environment: "staging" 

  tasks:
    - name: "Verifica connettività e versione OS"
      ansible.builtin.shell: "uname -a"
      register: system_info

    - name: "Crea la directory di lavoro se non esiste"
      ansible.builtin.file:
        path: "{{ working_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: "Esegue un comando custom usando le vars"
      ansible.builtin.shell: "echo 'Avvio app su porta {{ app_port }} in {{ target_environment }}'"
      register: command_output

    - name: "Mostra il risultato a video"
      ansible.builtin.debug:
        msg: "Il server ha risposto: {{ system_info.stdout }}"
