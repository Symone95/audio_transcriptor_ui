name: Build App

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Windows
    - name: Upgrade pip, wheel, setuptools
      if: runner.os == 'Windows'
      run: python -m pip install --upgrade pip wheel setuptools

    - name: Install Kivy dependencies
      if: runner.os == 'Windows'
      run: pip install "kivy[base]" kivy_deps.glew kivy_deps.sdl2 kivy_deps.angle --progress-bar off

    - name: Install remaining requirements
      if: runner.os == 'Windows'
      run:
        "pip install --only-binary=:all: -r requirements.txt"

    - name: Install PyInstaller
      if: runner.os == 'Windows'
      run: pip install pyinstaller



      # Linux/macOS
    - name: Install dependencies on Linux/macOS
      if: runner.os != 'Windows'
      run: |
        pip install -v -r requirements.txt
        pip install -v pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller Audio_Transcriptor.spec

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Audio_Transcriptor-${{ matrix.os }}
        path: dist/