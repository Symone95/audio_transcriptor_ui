name: Build App

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, windows-2022 ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Windows dependencies
      if: runner.os == 'Windows'
      run: |
        pip install kivy-deps.sdl2 kivy_deps.glew kivy_deps.angle

    - name: Build with PyInstaller (Mac/Linux)
      if: runner.os != 'Windows'
      run: |
        pyinstaller Audio_Transcriptor.spec

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      env:
        KIVY_WINDOW: sdl2
        KIVY_GL_BACKEND: mock
      run: |
        pyinstaller --noconfirm --clean Audio_Transcriptor.spec

    - name: Upload macOS artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: Audio_Transcriptor-macos
        path: dist/

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: Audio_Transcriptor-windows
        path: dist/
